<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистратура</title>
    <script src="https://cdn.tailwindcss.com"></script>/* чтобы писать стили прямо в html  */
    <script>tailwind.config = {darkMode:'class'}</script>
    <style>
        body{transition:background 0.3s}
        button, input, select, textarea { touch-action: manipulation; }
        input, select, textarea { font-size: 16px; } /* Предотвращает зум  */
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen">

<header class="bg-white dark:bg-gray-800 shadow p-3 sm:p-4 flex flex-wrap justify-between items-center gap-2 sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <h1 class="font-bold text-base sm:text-lg text-blue-600">Регистратура</h1>
    </div>
    <div class="flex items-center gap-2 sm:gap-3 flex-wrap">
        <nav id="nav" class="flex gap-1 sm:gap-2 text-xs sm:text-sm">
            <button onclick="show('home')" class="px-2 sm:px-3 py-1.5 rounded-lg bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 whitespace-nowrap">Главная</button>
            <button onclick="show('auth')" class="px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 whitespace-nowrap">Врачам</button>
            <button onclick="show('adminAuth')" class="px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 whitespace-nowrap"> Админ</button>
        </nav>
        <button onclick="toggleDark()" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700">🌓</button>
        <div id="userNav" class="hidden items-center gap-2 bg-gray-100 dark:bg-gray-700 px-2 sm:px-3 py-1.5 rounded-lg text-xs sm:text-sm">
            <button onclick="logout()" class="text-red-500 font-bold">×</button>
        </div>
    </div>
</header>
<main class="p-3 sm:p-6 max-w-5xl mx-auto">

    <section id="home" class="hidden space-y-4 sm:space-y-6">
        <div class="text-center py-4 sm:py-6">
            <h2 class="text-2xl sm:text-3xl font-bold mb-1 sm:mb-2">Запись к врачу</h2>
            <p class="text-gray-500 text-sm sm:text-base">Выберите специалиста и время</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 mb-4 sm:mb-6">
            <input type="text" id="searchDoc" placeholder="Поиск врача..." oninput="renderDoctors()" class="flex-1 p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
            <select id="filterSpec" onchange="renderDoctors()" class="p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                <option value="">Все специальности</option>
                <option>Терапевт</option><option>Хирург</option><option>Кардиолог</option>
                <option>Невролог</option><option>Офтальмолог</option><option>Педиатр</option>
            </select>
        </div>
        <div id="doctorsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4"></div>
    </section>

    <section id="appointment" class="hidden max-w-2xl mx-auto">
        <button onclick="show('home')" class="mb-3 sm:mb-4 text-blue-500 hover:underline text-sm sm:text-base">← Назад к списку</button>
        <div class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl shadow-lg space-y-4">
            <div class="flex items-center gap-3 sm:gap-4 pb-3 sm:pb-4 border-b dark:border-gray-700">
                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-blue-500 rounded-2xl flex items-center justify-center text-xl sm:text-2xl text-white flex-shrink-0">👨‍️</div>
                <div class="min-w-0">
                    <h2 id="aptDocName" class="text-lg sm:text-2xl font-bold truncate"></h2>
                    <p id="aptDocSpec" class="text-blue-600 text-sm sm:text-base"></p>
                </div>
            </div>
            <input type="date" id="aptDate" onchange="renderTimeSlots()" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
            <div id="timeSlots" class="flex flex-wrap gap-2"></div>
            <input id="aptPatient" placeholder="ФИО пациента *" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
            <input id="aptPhone" placeholder="Телефон *" type="tel" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
            <textarea id="aptComment" placeholder="Жалобы (необязательно)" rows="2" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base resize-none"></textarea>
            <button onclick="submitAppointment()" class="w-full bg-green-600 hover:bg-green-700 active:bg-green-800 text-white p-3 rounded-xl font-bold text-sm sm:text-base min-h-[44px] transition">Записаться</button>
        </div>
    </section>

    <section id="auth" class="hidden max-w-md mx-auto">
        <div class="bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-2xl shadow-lg">
            <div id="loginForm">
                <h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 text-center">Вход для врачей</h2>
                <form onsubmit="login(event)" class="space-y-3 sm:space-y-4">
                    <input type="email" id="e" placeholder="Email" required class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                    <input type="password" id="p" placeholder="Пароль" required class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold text-sm sm:text-base min-h-[44px]">Войти</button>
                </form>
                <p class="text-center mt-4 text-xs sm:text-sm">Нет аккаунта? <a href="#" onclick="toggleAuth()" class="text-blue-500 font-bold">Регистрация</a></p>
                <p id="msg" class="text-red-500 text-center text-xs sm:text-sm mt-2 hidden bg-red-50 dark:bg-red-900/20 py-1 rounded"></p>
            </div>
            <div id="regForm" class="hidden">
                <h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 text-center">Регистрация</h2>
                <form onsubmit="register(event)" class="space-y-3 sm:space-y-4">
                    <input id="rName" placeholder="ФИО" required class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                    <select id="rSpec" required class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                        <option value="">Специальность</option>
                        <option>Терапевт</option><option>Хирург</option><option>Кардиолог</option>
                        <option>Невролог</option><option>Офтальмолог</option><option>Педиатр</option>
                    </select>
                    <input type="email" id="rEmail" placeholder="Email" required class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                    <input type="password" id="rPass" placeholder="Пароль" required minlength="6" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                    <button class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl font-bold text-sm sm:text-base min-h-[44px]">Зарегистрироваться</button>
                </form>
                <p class="text-center mt-4 text-xs sm:text-sm">Есть аккаунт? <a href="#" onclick="toggleAuth()" class="text-blue-500 font-bold">Войти</a></p>
            </div>
            <div id="successMsg" class="hidden text-center py-4">
                <div class="text-4xl sm:text-5xl mb-3 sm:mb-4">✅</div>
                <h3 class="text-lg sm:text-xl font-bold mb-2">Успешно!</h3>
                <button onclick="showLogin()" class="mt-3 sm:mt-4 text-blue-500 font-bold text-sm sm:text-base">Войти</button>
            </div>
        </div>
    </section>

     <section id="doctor" class="hidden space-y-4 sm:space-y-6">
        <div class="bg-gradient-to-r from-blue-600 to-blue-800 text-white p-4 sm:p-6 rounded-2xl shadow-lg flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-4">
            <div class="text-center sm:text-left min-w-0">
                <h2 id="docName" class="text-xl sm:text-2xl font-bold truncate"></h2>
                <p id="docSpec" class="text-blue-200 text-sm sm:text-base"></p>
            </div>
            <div class="bg-white/20 p-3 sm:p-4 rounded-xl text-center backdrop-blur-sm min-w-[100px] sm:min-w-[120px]">
                <p class="text-xs sm:text-sm">Записей сегодня</p>
                <p id="docCount" class="text-2xl sm:text-3xl font-bold">0</p>
            </div>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl shadow-lg">
            <h3 class="font-bold text-lg sm:text-xl mb-3 sm:mb-4"> Мои записи</h3>
            <div id="docList" class="space-y-2 sm:space-y-3"></div>
            <p id="docEmpty" class="text-center text-gray-400 py-6 sm:py-8 text-sm hidden">Нет записей</p>
        </div>
    </section>

    <section id="adminAuth" class="hidden max-w-md mx-auto">
        <div class="bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-2xl shadow-lg">
            <h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 text-center"> Панель администратора</h2>
            <form onsubmit="adminLogin(event)" class="space-y-3 sm:space-y-4">
                <input id="aEmail" value="admin@hospital.ru" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                <input id="aPass" value="admin123" type="password" class="w-full p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 text-sm sm:text-base min-h-[44px]">
                <button class="w-full bg-gray-800 hover:bg-black text-white p-3 rounded-xl font-bold text-sm sm:text-base min-h-[44px]">Войти</button>
            </form>
        </div>
    </section>
