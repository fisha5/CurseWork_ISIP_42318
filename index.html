<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистратура</title>
    <script src="https://cdn.tailwindcss.com"></script>/* чтобы писать стили прямо в html  */
    <script>tailwind.config = {darkMode:'class'}</script>
    <style>
        body{transition:background 0.3s}
        button, input, select, textarea { touch-action: manipulation; }
        input, select, textarea { font-size: 16px; } /* Предотвращает зум  */
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen">

<!-- ШАПКА -->
<header class="bg-white dark:bg-gray-800 shadow p-3 sm:p-4 flex flex-wrap justify-between items-center gap-2 sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <h1 class="font-bold text-base sm:text-lg text-blue-600">Регистратура</h1>
    </div>
    <div class="flex items-center gap-2 sm:gap-3 flex-wrap">
        <nav id="nav" class="flex gap-1 sm:gap-2 text-xs sm:text-sm">
            <button onclick="show('home')" class="px-2 sm:px-3 py-1.5 rounded-lg bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 whitespace-nowrap">Главная</button>
            <button onclick="show('auth')" class="px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 whitespace-nowrap">Врачам</button>
            <button onclick="show('adminAuth')" class="px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 whitespace-nowrap"> Админ</button>
        </nav>
        <button onclick="toggleDark()" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700">🌓</button>
        <div id="userNav" class="hidden items-center gap-2 bg-gray-100 dark:bg-gray-700 px-2 sm:px-3 py-1.5 rounded-lg text-xs sm:text-sm">
            <button onclick="logout()" class="text-red-500 font-bold">×</button>
        </div>
    </div>
</header>
